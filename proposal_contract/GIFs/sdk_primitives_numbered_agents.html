<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenAI Agents SDK — Primitives & Numbered Agents</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --df-accent: #E85D75; --df-muted: #64748B; --df-border: #E2E8F0; --df-text: #1a1a1a; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(165deg, #FFF9F6 0%, #FAFAFA 100%); color: var(--df-text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    h1 { font-size: 1.2rem; font-weight: 800; margin: 0 0 4px 0; }
    .subtitle { font-size: 0.8rem; color: var(--df-muted); margin-bottom: 12px; }
    .diagram-wrap { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 20px; max-width: 920px; }
    .diagram-wrap svg { display: block; width: 100%; height: auto; }
    .moving-dash { stroke-dasharray: 10 8; animation: dash 1.2s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -36; } }
    .flow-dot { fill: var(--df-accent); filter: drop-shadow(0 0 4px rgba(232,93,117,0.8)); }
    .caption { font-size: 0.7rem; color: var(--df-muted); margin-top: 12px; }
  </style>
</head>
<body>
  <h1>OpenAI Agents SDK — Primitives (Dragonfruit)</h1>
  <p class="subtitle">Agents = LLM + instructions + tools · Handoffs = agents as tools · HITL</p>

  <div class="diagram-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400">
      <defs>
        <marker id="m1" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#E85D75"/></marker>
      </defs>
      <rect width="860" height="400" fill="#FAFAFA"/>

      <!-- Title -->
      <text x="430" y="28" text-anchor="middle" font="600 11px 'Plus Jakarta Sans'" fill="#64748B">Numbered role agents — handoffs = agent as tool</text>

      <!-- Agent 1 -->
      <rect x="30" y="50" width="130" height="56" rx="8" fill="#E85D75" stroke="#C94B62" stroke-width="1.5"/>
      <text x="95" y="72" text-anchor="middle" font="700 12px 'Plus Jakarta Sans'" fill="#fff">1 Producer</text>
      <text x="95" y="88" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="rgba(255,255,255,0.95)">PR-4, ClickUp, Slack</text>

      <!-- Arrow 1→2 -->
      <path d="M 160 78 L 210 78" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#m1)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.2s" repeatCount="indefinite" path="M 160 78 L 210 78"/></circle>
      <circle r="5" class="flow-dot"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.4s" path="M 160 78 L 210 78"/></circle>

      <!-- Agent 2 -->
      <rect x="210" y="50" width="130" height="56" rx="8" fill="#FFFBF7" stroke="#E85D75" stroke-width="2"/>
      <text x="275" y="72" text-anchor="middle" font="700 12px 'Plus Jakarta Sans'" fill="#1a1a1a">2 PC</text>
      <text x="275" y="88" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">Status, Slack</text>

      <!-- Arrow 2→3 -->
      <path d="M 340 78 L 390 78" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#m1)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.2s" path="M 340 78 L 390 78"/></circle>

      <!-- Agent 3 -->
      <rect x="390" y="50" width="130" height="56" rx="8" fill="#FFFBF7" stroke="#E85D75" stroke-width="2"/>
      <text x="455" y="72" text-anchor="middle" font="700 12px 'Plus Jakarta Sans'" fill="#1a1a1a">3 CD</text>
      <text x="455" y="88" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">Retention, outlier, A/B</text>

      <!-- Arrow 3→4 -->
      <path d="M 520 78 L 570 78" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#m1)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.3s" path="M 520 78 L 570 78"/></circle>

      <!-- Agent 4 -->
      <rect x="570" y="50" width="130" height="56" rx="8" fill="#FFFBF7" stroke="#E85D75" stroke-width="2"/>
      <text x="635" y="72" text-anchor="middle" font="700 12px 'Plus Jakarta Sans'" fill="#1a1a1a">4 PPM</text>
      <text x="635" y="88" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">QC, sentiment, capacity</text>

      <!-- Arrow 4→5 -->
      <path d="M 700 78 L 750 78" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#m1)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.15s" path="M 700 78 L 750 78"/></circle>

      <!-- Agent 5 -->
      <rect x="750" y="50" width="100" height="56" rx="8" fill="#FFFBF7" stroke="#E85D75" stroke-width="2"/>
      <text x="800" y="72" text-anchor="middle" font="700 12px 'Plus Jakarta Sans'" fill="#1a1a1a">5 Editor</text>
      <text x="800" y="88" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">Consumer</text>

      <!-- Agent loop (horizontal flow) -->
      <text x="430" y="148" text-anchor="middle" font="600 10px 'Plus Jakarta Sans'" fill="#64748B">Agent loop: User input → LLM (Reason) → Tool call → Result → LLM → … → Response</text>
      <path d="M 80 165 L 780 165" stroke="#E85D75" stroke-width="2" fill="none" stroke-dasharray="12 10" class="moving-dash"/>
      <circle r="6" class="flow-dot"><animateMotion dur="2.5s" repeatCount="indefinite" path="M 80 165 L 780 165"/></circle>
      <circle r="6" class="flow-dot"><animateMotion dur="2.5s" repeatCount="indefinite" begin="0.8s" path="M 80 165 L 780 165"/></circle>
      <circle r="6" class="flow-dot"><animateMotion dur="2.5s" repeatCount="indefinite" begin="1.6s" path="M 80 165 L 780 165"/></circle>

      <!-- Tools row -->
      <text x="430" y="208" text-anchor="middle" font="600 10px 'Plus Jakarta Sans'" fill="#64748B">Tools (function + MCP)</text>
      <rect x="40" y="218" width="110" height="36" rx="6" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1"/>
      <text x="95" y="238" text-anchor="middle" font="600 10px 'Plus Jakarta Sans'" fill="#1a1a1a">ClickUp</text>
      <rect x="165" y="218" width="110" height="36" rx="6" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1"/>
      <text x="220" y="238" text-anchor="middle" font="600 10px 'Plus Jakarta Sans'" fill="#1a1a1a">Slack</text>
      <rect x="290" y="218" width="110" height="36" rx="6" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1"/>
      <text x="345" y="238" text-anchor="middle" font="600 10px 'Plus Jakarta Sans'" fill="#1a1a1a">Frame.io</text>
      <rect x="415" y="218" width="110" height="36" rx="6" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1"/>
      <text x="470" y="238" text-anchor="middle" font="600 10px 'Plus Jakarta Sans'" fill="#1a1a1a">Notion</text>
      <rect x="540" y="218" width="110" height="36" rx="6" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1"/>
      <text x="595" y="238" text-anchor="middle" font="600 10px 'Plus Jakarta Sans'" fill="#1a1a1a">QC / Capacity</text>

      <!-- Arrows from agents to tools (1 to ClickUp, etc.) -->
      <path d="M 95 106 L 95 218" stroke="#E85D75" stroke-width="1.5" fill="none" class="moving-dash"/>
      <circle r="4" class="flow-dot"><animateMotion dur="1.8s" repeatCount="indefinite" path="M 95 106 L 95 218"/></circle>
      <path d="M 275 106 L 220 218" stroke="#E85D75" stroke-width="1.5" fill="none" class="moving-dash"/>
      <circle r="4" class="flow-dot"><animateMotion dur="1.8s" repeatCount="indefinite" begin="0.5s" path="M 275 106 L 220 218"/></circle>
      <path d="M 455 106 L 345 218" stroke="#E85D75" stroke-width="1.5" fill="none" class="moving-dash"/>
      <circle r="4" class="flow-dot"><animateMotion dur="1.8s" repeatCount="indefinite" begin="0.3s" path="M 455 106 L 345 218"/></circle>
      <path d="M 635 106 L 595 218" stroke="#E85D75" stroke-width="1.5" fill="none" class="moving-dash"/>
      <circle r="4" class="flow-dot"><animateMotion dur="1.8s" repeatCount="indefinite" begin="0.7s" path="M 635 106 L 595 218"/></circle>

      <!-- HITL -->
      <rect x="40" y="278" width="780" height="52" rx="8" fill="#FEE2E2" stroke="#C94B62" stroke-width="1.5"/>
      <text x="430" y="298" text-anchor="middle" font="700 11px 'Plus Jakarta Sans'" fill="#C94B62">HITL: task create · assignee confirm · client message · QC escalate</text>
      <text x="430" y="316" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">Human approves before any create / send / assign</text>
    </svg>
  </div>
  <p class="caption">Batch 1 · Moving dashed arrows + dots. Record as GIF.</p>
</body>
</html>
