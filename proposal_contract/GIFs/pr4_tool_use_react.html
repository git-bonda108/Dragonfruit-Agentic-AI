<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR-4 — Tool Use + ReAct (Claude-to-ClickUp)</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --df-accent: #E85D75; --df-muted: #64748B; --df-border: #E2E8F0; --df-text: #1a1a1a; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(165deg, #FFF9F6 0%, #FAFAFA 100%); color: var(--df-text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    h1 { font-size: 1.15rem; font-weight: 800; margin: 0 0 4px 0; }
    .subtitle { font-size: 0.8rem; color: var(--df-muted); margin-bottom: 12px; }
    .diagram-wrap { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 20px; max-width: 920px; }
    .diagram-wrap svg { display: block; width: 100%; height: auto; }
    .moving-dash { stroke-dasharray: 10 8; animation: dash 1.2s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -36; } }
    .flow-dot { fill: var(--df-accent); filter: drop-shadow(0 0 4px rgba(232,93,117,0.8)); }
    .caption { font-size: 0.7rem; color: var(--df-muted); margin-top: 12px; }
  </style>
</head>
<body>
  <h1>PR-4 — Tool Use + ReAct (Agent 1 · Claude-to-ClickUp)</h1>
  <p class="subtitle">OpenAI Agents SDK: Reason → Act (tool call) → Observe → … → HITL → Execute</p>

  <div class="diagram-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#E85D75"/></marker>
      </defs>
      <rect width="880" height="340" fill="#FAFAFA"/>

      <!-- User / Query -->
      <rect x="20" y="20" width="160" height="50" rx="8" fill="#FFFBF7" stroke="#E85D75" stroke-width="2"/>
      <text x="100" y="42" text-anchor="middle" font="600 11px 'Plus Jakarta Sans'" fill="#1a1a1a">User / Query</text>
      <text x="100" y="58" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">"Create task: script review by Fri"</text>

      <!-- Arrow 1: Query to Agent -->
      <path d="M 180 45 L 260 45" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 180 45 L 260 45"/></circle>
      <circle r="5" class="flow-dot"><animateMotion dur="1.4s" repeatCount="indefinite" begin="0.35s" path="M 180 45 L 260 45"/></circle>

      <!-- Agent 1 (Reason) -->
      <rect x="260" y="15" width="140" height="60" rx="8" fill="#E85D75" stroke="#C94B62" stroke-width="1.5"/>
      <text x="330" y="38" text-anchor="middle" font="700 12px 'Plus Jakarta Sans'" fill="#fff">Agent 1 (Producer)</text>
      <text x="330" y="54" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="rgba(255,255,255,0.95)">LLM Reason: decompose → fields</text>

      <!-- Arrow 2: Agent to Tool call -->
      <path d="M 400 45 L 480 45" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.4s" repeatCount="indefinite" begin="0.2s" path="M 400 45 L 480 45"/></circle>

      <!-- Tool: ClickUp -->
      <rect x="480" y="15" width="120" height="60" rx="8" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="540" y="42" text-anchor="middle" font="700 11px 'Plus Jakarta Sans'" fill="#1a1a1a">Tool: ClickUp</text>
      <text x="540" y="58" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">create_task / update</text>

      <!-- Arrow 3: Tool result back -->
      <path d="M 600 45 L 600 120 L 330 120 L 330 78" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="2.2s" repeatCount="indefinite" path="M 600 45 L 600 120 L 330 120 L 330 78"/></circle>

      <!-- HITL -->
      <rect x="260" y="125" width="140" height="50" rx="8" fill="#FEE2E2" stroke="#C94B62" stroke-width="2"/>
      <text x="330" y="148" text-anchor="middle" font="700 11px 'Plus Jakarta Sans'" fill="#C94B62">HITL: Confirm task</text>
      <text x="330" y="163" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">Human approves before create</text>

      <!-- Arrow 4: HITL to Execute -->
      <path d="M 330 175 L 330 215" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1s" repeatCount="indefinite" path="M 330 175 L 330 215"/></circle>

      <!-- Execute / Slack -->
      <rect x="260" y="215" width="140" height="50" rx="8" fill="#FFFBF7" stroke="#E85D75" stroke-width="2"/>
      <text x="330" y="238" text-anchor="middle" font="700 11px 'Plus Jakarta Sans'" fill="#1a1a1a">Execute</text>
      <text x="330" y="253" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">ClickUp create + optional Slack</text>

      <!-- Right side: Tool Slack -->
      <path d="M 400 45 L 400 95 L 680 95 L 680 270 L 405 270" stroke="#E85D75" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s" path="M 400 45 L 400 95 L 680 95 L 680 270 L 405 270"/></circle>
      <rect x="620" y="240" width="120" height="60" rx="8" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="680" y="263" text-anchor="middle" font="700 11px 'Plus Jakarta Sans'" fill="#1a1a1a">Tool: Slack</text>
      <text x="680" y="278" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">send_message (if needed)</text>

      <!-- Labels -->
      <text x="440" y="70" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">tool call</text>
      <text x="465" y="105" text-anchor="middle" font="500 9px 'Plus Jakarta Sans'" fill="#64748B">result</text>
    </svg>
  </div>
  <p class="caption">Batch 2 · Moving dashed arrows + dots show info flow. Record as GIF.</p>
</body>
</html>
