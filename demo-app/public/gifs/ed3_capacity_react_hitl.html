<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ED-3 — ReAct + HITL (Capacity-Based Assignment)</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --df-accent: #FF3B2E; --df-accent-hover: #E53935; --df-muted: #64748B; --df-border: #E2E8F0; --df-text: #1a1a1a; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: 'Inter', Helvetica, sans-serif; background: linear-gradient(165deg, #FFF9F6 0%, #FAFAFA 100%); color: var(--df-text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; font-weight: 400; letter-spacing: 0.02em; margin: 0 0 4px 0; }
    .subtitle { font-family: 'Inter', Helvetica, sans-serif; font-size: 0.5rem; color: var(--df-muted); margin-bottom: 12px; max-width: 920px; overflow-wrap: break-word; }
    .diagram-wrap { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 20px; max-width: 920px; overflow: hidden; }
    .diagram-wrap svg { display: block; width: 100%; height: auto; overflow: hidden; }
    .moving-dash { stroke-dasharray: 10 8; animation: dash 1.2s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -36; } }
    .flow-dot { fill: var(--df-accent); filter: drop-shadow(0 0 4px rgba(255,59,46,0.8)); }
    .caption { font-family: 'Inter', Helvetica, sans-serif; font-size: 0.45rem; color: var(--df-muted); margin-top: 12px; }
  </style>
</head>
<body>
  <h1>ED-3 — ReAct + HITL (Agent 4 · Capacity-Based Assignment)</h1>
  <p class="subtitle">OpenAI Agents SDK: Reason (workload) → Act (tools) → Observe → Suggest → HITL confirm assignee</p>

  <div class="diagram-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320">
      <defs>
        <marker id="arr2" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#FF3B2E"/></marker>
      </defs>
      <rect width="880" height="320" fill="#FAFAFA"/>

      <!-- Trigger: New task / Assign needed -->
      <rect x="20" y="25" width="150" height="55" rx="8" fill="#FFFBF7" stroke="#FF3B2E" stroke-width="2"/>
      <text x="95" y="48" text-anchor="middle" font="600 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">New task in ClickUp</text>
      <text x="95" y="65" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">Assignee needed</text>

      <!-- Arrow: to Agent 4 -->
      <path d="M 170 52 L 250 52" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr2)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.3s" repeatCount="indefinite" path="M 170 52 L 250 52"/></circle>
      <circle r="5" class="flow-dot"><animateMotion dur="1.3s" repeatCount="indefinite" begin="0.4s" path="M 170 52 L 250 52"/></circle>

      <!-- Agent 4 (PPM) Reason -->
      <rect x="250" y="15" width="150" height="74" rx="8" fill="#FF3B2E" stroke="#E53935" stroke-width="1.5"/>
      <text x="325" y="38" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#fff">Agent 4 (PPM)</text>
      <text x="325" y="55" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="rgba(255,255,255,0.95)">Reason: skill, pod, workload</text>
      <text x="325" y="78" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="rgba(255,255,255,0.9)">→ decide which tools to call</text>

      <!-- Arrow: to Capacity DB tool -->
      <path d="M 400 52 L 480 52" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr2)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.2s" path="M 400 52 L 480 52"/></circle>

      <!-- Tool: Capacity DB / ClickUp -->
      <rect x="480" y="25" width="140" height="74" rx="8" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="550" y="48" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">Tool: Capacity DB</text>
      <text x="550" y="65" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">workload, skill, pod</text>
      <text x="550" y="88" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">+ ClickUp list tasks</text>

      <!-- Arrow: result back to Agent -->
      <path d="M 620 62 L 620 130 L 325 130 L 325 92" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr2)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="2s" repeatCount="indefinite" path="M 620 62 L 620 130 L 325 130 L 325 92"/></circle>

      <!-- Suggest assignees -->
      <rect x="250" y="135" width="150" height="50" rx="8" fill="#FFFBF7" stroke="#FF3B2E" stroke-width="2"/>
      <text x="325" y="158" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">Suggest assignees</text>
      <text x="325" y="173" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">Editor A, B (ranked)</text>

      <!-- Arrow: to HITL -->
      <path d="M 325 185 L 325 225" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr2)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1s" repeatCount="indefinite" path="M 325 185 L 325 225"/></circle>

      <!-- HITL -->
      <rect x="250" y="225" width="150" height="55" rx="8" fill="#FEE2E2" stroke="#E53935" stroke-width="2"/>
      <text x="325" y="248" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#E53935">HITL: Confirm assignee</text>
      <text x="325" y="265" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">Human picks / confirms</text>

      <!-- Arrow: HITL to Execute -->
      <path d="M 325 280 L 325 295 L 550 295 L 550 270" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr2)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.6s" repeatCount="indefinite" begin="0.3s" path="M 325 280 L 325 295 L 550 295 L 550 270"/></circle>

      <!-- Execute: ClickUp assign (after HITL) -->
      <rect x="480" y="245" width="140" height="50" rx="8" fill="#FFFBF7" stroke="#FF3B2E" stroke-width="2"/>
      <text x="550" y="268" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">Execute</text>
      <text x="550" y="283" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">ClickUp assign_task</text>

      <!-- Label -->
      <text x="440" y="42" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">tool call</text>
      <text x="470" y="118" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">result</text>
    </svg>
  </div>
  <p class="caption">Batch 2 · Moving dashed arrows + dots. Record as GIF.</p>
</body>
</html>
