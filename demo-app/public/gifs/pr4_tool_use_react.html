<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR-4 — Tool Use + ReAct (Claude-to-ClickUp)</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --df-accent: #FF3B2E; --df-accent-hover: #E53935; --df-muted: #64748B; --df-border: #E2E8F0; --df-text: #1a1a1a; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: 'Inter', Helvetica, sans-serif; background: linear-gradient(165deg, #FFF9F6 0%, #FAFAFA 100%); color: var(--df-text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem; font-weight: 400; letter-spacing: 0.02em; margin: 0 0 4px 0; }
    .subtitle { font-family: 'Inter', Helvetica, sans-serif; font-size: 0.5rem; color: var(--df-muted); margin-bottom: 12px; max-width: 920px; overflow-wrap: break-word; }
    .diagram-wrap { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 20px; max-width: 920px; overflow: hidden; }
    .diagram-wrap svg { display: block; width: 100%; height: auto; overflow: hidden; }
    .moving-dash { stroke-dasharray: 10 8; animation: dash 1.2s linear infinite; }
    @keyframes dash { to { stroke-dashoffset: -36; } }
    .flow-dot { fill: var(--df-accent); filter: drop-shadow(0 0 4px rgba(255,59,46,0.8)); }
    .caption { font-family: 'Inter', Helvetica, sans-serif; font-size: 0.45rem; color: var(--df-muted); margin-top: 12px; }
  </style>
</head>
<body>
  <h1>PR-4 — Tool Use + ReAct (Agent 1 · Claude-to-ClickUp)</h1>
  <p class="subtitle">OpenAI Agents SDK: Reason → Act (tool call) → Observe → … → HITL → Execute</p>

  <div class="diagram-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#FF3B2E"/></marker>
      </defs>
      <rect width="880" height="340" fill="#FAFAFA"/>

      <!-- User / Query: LLM text input (replaces Slack) -->
      <rect x="20" y="14" width="170" height="62" rx="8" fill="#FFFBF7" stroke="#FF3B2E" stroke-width="2"/>
      <text x="105" y="36" text-anchor="middle" font="600 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">LLM text input</text>
      <text x="105" y="52" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">Create task, tags</text>
      <text x="105" y="64" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">Mango, Lemon</text>

      <!-- Arrow 1: LLM input to Agent -->
      <path d="M 190 45 L 260 45" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.4s" repeatCount="indefinite" path="M 190 45 L 260 45"/></circle>
      <circle r="5" class="flow-dot"><animateMotion dur="1.4s" repeatCount="indefinite" begin="0.35s" path="M 190 45 L 260 45"/></circle>

      <!-- Agent 1 (Reason) -->
      <rect x="260" y="15" width="140" height="60" rx="8" fill="#FF3B2E" stroke="#E53935" stroke-width="1.5"/>
      <text x="330" y="38" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#fff">Agent 1 (Producer)</text>
      <text x="330" y="54" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="rgba(255,255,255,0.95)">Reason: decompose → fields</text>

      <!-- Arrow 2: Agent to Tool call -->
      <path d="M 400 45 L 480 45" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1.4s" repeatCount="indefinite" begin="0.2s" path="M 400 45 L 480 45"/></circle>

      <!-- Tool: ClickUp (wider box so text fits) -->
      <rect x="480" y="12" width="140" height="66" rx="8" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="550" y="38" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">Tool: ClickUp</text>
      <text x="550" y="56" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">create_task</text>

      <!-- Arrow 3: Tool result back (from right edge of ClickUp box 620) -->
      <path d="M 620 45 L 620 120 L 330 120 L 330 78" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="2.2s" repeatCount="indefinite" path="M 620 45 L 620 120 L 330 120 L 330 78"/></circle>

      <!-- HITL (taller box, text inside with padding) -->
      <rect x="260" y="122" width="140" height="58" rx="8" fill="#FEE2E2" stroke="#E53935" stroke-width="2"/>
      <text x="330" y="144" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#E53935">HITL: Confirm task</text>
      <text x="330" y="162" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">Approve</text>

      <!-- Arrow 4: HITL to Execute -->
      <path d="M 330 175 L 330 215" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="1s" repeatCount="indefinite" path="M 330 175 L 330 215"/></circle>

      <!-- Execute: log to ClickUp (LLM replaces Slack) -->
      <rect x="260" y="212" width="140" height="56" rx="8" fill="#FFFBF7" stroke="#FF3B2E" stroke-width="2"/>
      <text x="330" y="234" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">Execute</text>
      <text x="330" y="250" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">ClickUp + log</text>
      <text x="330" y="262" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">tags, deps</text>

      <!-- Right: LLM (input) - replaces Slack -->
      <path d="M 400 45 L 400 95 L 680 95 L 680 272 L 408 272" stroke="#FF3B2E" stroke-width="2" fill="none" marker-end="url(#arr)" class="moving-dash"/>
      <circle r="5" class="flow-dot"><animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s" path="M 400 45 L 400 95 L 680 95 L 680 272 L 408 272"/></circle>
      <rect x="618" y="238" width="126" height="56" rx="8" fill="#FFFBF7" stroke="#E2E8F0" stroke-width="1.5"/>
      <text x="681" y="258" text-anchor="middle" font="700 5px 'Bebas Neue', sans-serif" fill="#1a1a1a">LLM (input)</text>
      <text x="681" y="272" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">parse → route</text>

      <!-- Labels -->
      <text x="440" y="70" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">tool call</text>
      <text x="465" y="105" text-anchor="middle" font="500 5px 'Inter', sans-serif" fill="#64748B">result</text>
    </svg>
  </div>
  <p class="caption">Batch 2 · Moving dashed arrows + dots show info flow. Record as GIF.</p>
</body>
</html>
